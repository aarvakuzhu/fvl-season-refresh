<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FVL — Draft Comparison</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#0d1b2a;--blue:#1a5fb4;--blue2:#e8eef8;--red:#cc0000;--green:#1b7a1b;--green2:#e8f5e9;--amber:#d35400;--bg:#f2f2f2;--border:#ddd;--border2:#ededed;--text:#1a1a1a;--muted:#666;--light:#f8f8f8;--o1:#1a5fb4;--o2:#7b1fa2}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Roboto',sans-serif;min-height:100vh}
    #hdr{background:var(--navy);height:48px;display:flex;align-items:center;padding:0 14px;gap:10px;position:sticky;top:0;z-index:100}
    .hbadge{background:var(--red);color:#fff;font-size:10px;font-weight:900;padding:2px 6px;border-radius:2px}
    .htitle{font-size:16px;font-weight:700;color:#fff}.htitle em{color:#f5c842;font-style:normal}
    .hright{margin-left:auto;display:flex;gap:8px}
    .hbtn{font-size:12px;font-weight:600;padding:5px 11px;border-radius:2px;text-decoration:none;border:none;cursor:pointer;font-family:'Roboto',sans-serif}
    .hbtn-ghost{background:transparent;color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.3)}.hbtn-ghost:hover{color:#fff}
    .page{max-width:1400px;margin:0 auto;padding:14px}

    /* selector bar */
    #selector{background:#fff;border:1px solid var(--border);padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
    .sel-group{display:flex;flex-direction:column;gap:4px}
    .sel-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
    .sel-row{display:flex;gap:6px;align-items:center}
    select.sel{padding:6px 10px;border:1px solid var(--border);border-radius:2px;font-size:13px;font-family:'Roboto Mono',monospace;font-weight:700;background:#fff;cursor:pointer;outline:none}
    .opt-tag{font-family:'Roboto Mono',monospace;font-size:9px;padding:2px 6px;border-radius:2px;font-weight:700}
    .opt-tag.o1{background:#e3f2fd;color:var(--o1)}.opt-tag.o2{background:#f3e5f5;color:var(--o2)}
    .vs-lbl{font-size:16px;font-weight:900;color:var(--muted);padding:0 4px}
    .btn-compare{padding:7px 18px;border:none;border-radius:2px;background:var(--blue);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Roboto',sans-serif}
    .btn-compare:hover{opacity:.85}

    /* stats bar */
    #stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .stat-card{background:#fff;border:1px solid var(--border);padding:10px 16px;flex:1;min-width:120px;border-top:3px solid var(--border)}
    .stat-card.similarity{border-top-color:var(--blue)}
    .stat-card.diff{border-top-color:var(--red)}
    .stat-n{font-size:26px;font-weight:900;color:var(--text);line-height:1}
    .stat-l{font-size:11px;color:var(--muted);margin-top:2px}

    /* team grid */
    #team-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
    @media(max-width:1000px){#team-grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:600px){#team-grid{grid-template-columns:1fr 1fr}}
    .tc{background:#fff;border:1px solid var(--border);overflow:hidden}
    .tc-hd{padding:7px 10px;font-size:12px;font-weight:700;color:#fff;display:flex;justify-content:space-between;align-items:center}
    .tc-hd .diff-ct{font-family:'Roboto Mono',monospace;font-size:9px;background:rgba(255,255,255,.2);padding:1px 5px;border-radius:2px}
    .tp{padding:5px 10px;font-size:12px;border-top:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;gap:4px}
    .tp.same{background:#fff}
    .tp.only-a{background:#e8f5e9;border-left:3px solid var(--green)}
    .tp.only-b{background:#ffebee;border-left:3px solid var(--red)}
    .tp-name{flex:1;font-weight:500}
    .tp-tag{font-family:'Roboto Mono',monospace;font-size:9px;padding:1px 5px;border-radius:2px;font-weight:700;white-space:nowrap}
    .tp-tag.ta{background:#e3f2fd;color:var(--o1)}.tp-tag.tb{background:#f3e5f5;color:var(--o2)}.tp-tag.ts{background:#f5f5f5;color:#999}

    /* pick table */
    #pick-table-wrap{margin-top:14px;overflow-x:auto;background:#fff;border:1px solid var(--border)}
    .pt{border-collapse:collapse;width:100%;font-size:12px}
    .pt th{background:var(--navy);color:#fff;padding:6px 10px;text-align:left;white-space:nowrap}
    .pt td{padding:5px 10px;border-bottom:1px solid var(--border2);white-space:nowrap}
    .pt tr:hover td{background:var(--light)}
    .pt td.diff{font-weight:700}
    .pt td.diff-a{color:var(--o1)}.pt td.diff-b{color:var(--o2)}
    .match-tick{color:var(--green);font-weight:700}.diff-cross{color:var(--red)}

    /* legend */
    .legend{display:flex;gap:14px;font-size:11px;color:var(--muted);margin-bottom:10px;flex-wrap:wrap}
    .ld{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}

    .empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
    .skel{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200%;animation:sk 1.3s infinite;border-radius:2px;height:180px}
    @keyframes sk{0%{background-position:200%}100%{background-position:-200%}}
  </style>
</head>
<body>
<div id="hdr">
  <span class="hbadge">FVL</span>
  <span class="htitle"><em>Draft</em> Comparison</span>
  <div class="hright">
    <a href="/draft" class="hbtn hbtn-ghost">🐍 Draft</a>
    <a href="/"      class="hbtn hbtn-ghost">← Home</a>
  </div>
</div>

<div class="page">
  <!-- Selector -->
  <div id="selector">
    <div class="sel-group">
      <span class="sel-label">Draft A</span>
      <div class="sel-row">
        <select class="sel" id="user-a"></select>
        <select class="sel" id="opt-a">
          <option value="1">Option 1</option>
          <option value="2" selected>Option 2</option>
        </select>
      </div>
    </div>
    <div class="vs-lbl">vs</div>
    <div class="sel-group">
      <span class="sel-label">Draft B</span>
      <div class="sel-row">
        <select class="sel" id="user-b"></select>
        <select class="sel" id="opt-b">
          <option value="1" selected>Option 1</option>
          <option value="2">Option 2</option>
        </select>
      </div>
    </div>
    <button class="btn-compare" onclick="runCompare()">⚖ Compare</button>
    <span id="sel-status" style="font-size:12px;color:var(--muted);align-self:center"></span>
  </div>

  <!-- Stats -->
  <div id="stats-bar" style="display:none">
    <div class="stat-card" id="sc-a"></div>
    <div class="stat-card" id="sc-b"></div>
    <div class="stat-card similarity"><div class="stat-n" id="sn-pct">—</div><div class="stat-l">Same placement %</div></div>
    <div class="stat-card diff"><div class="stat-n" id="sn-swaps" style="color:var(--red)">—</div><div class="stat-l">Trades (player pairs)</div></div>
    <div class="stat-card"><div class="stat-n" id="sn-same">—</div><div class="stat-l">Same placement</div></div>
  </div>

  <!-- Legend -->
  <div class="legend" id="legend" style="display:none">
    <span><span class="ld" style="background:var(--green)"></span>Only in Draft A</span>
    <span><span class="ld" style="background:var(--red)"></span>Only in Draft B</span>
    <span><span class="ld" style="background:#e0e0e0"></span>Same in both</span>
  </div>

  <!-- Team Grid -->
  <div id="team-grid"></div>

  <!-- Pick Table -->
  <div id="pick-table-wrap" style="display:none">
    <table class="pt" id="pick-table"></table>
  </div>
</div>

<script>
let ALL_SAVES = [];

async function loadSaves() {
  const r = await fetch('/api/draft-saves?season=3');
  ALL_SAVES = await r.json();
  const users = [...new Set(ALL_SAVES.map(s=>s.user))].sort();

  if (!users.length) {
    document.getElementById('team-grid').innerHTML =
      '<div class="empty" style="grid-column:1/-1">No draft saves found. Complete a draft on the draft screen first.</div>';
    return;
  }

  ['user-a','user-b'].forEach((id,i) => {
    const sel = document.getElementById(id);
    sel.innerHTML = users.map(u=>`<option value="${u}">${u}</option>`).join('');
    if (i===0) sel.value = users.includes('Ashok') ? 'Ashok' : users[0];
    else sel.value = users.includes('Sachin') ? 'Sachin' : (users[1]||users[0]);
  });

  // Set opt based on what's actually saved for each user
  const ashokSave = ALL_SAVES.find(s=>s.user==='Ashok');
  const sachinSave = ALL_SAVES.find(s=>s.user==='Sachin');
  document.getElementById('opt-a').value = ashokSave?.opt || '2';
  document.getElementById('opt-b').value = sachinSave?.opt || '1';

  // Auto-run comparison
  runCompare();
}

async function runCompare() {
  const userA = document.getElementById('user-a').value;
  const userB = document.getElementById('user-b').value;
  const optA  = document.getElementById('opt-a').value;
  const optB  = document.getElementById('opt-b').value;
  const status = document.getElementById('sel-status');

  if (!userA || !userB) { status.textContent = 'Select two users'; return; }
  if (userA === userB && optA === optB) { status.textContent = 'Select different drafts'; return; }
  status.textContent = 'Loading…';
  document.getElementById('team-grid').innerHTML =
    Array(6).fill('<div class="skel"></div>').join('');

  try {
    const r = await fetch(`/api/draft-compare?user1=${encodeURIComponent(userA)}&opt1=${optA}&user2=${encodeURIComponent(userB)}&opt2=${optB}&season=3`);
    if (!r.ok) {
      const e = await r.json();
      status.textContent = '✗ ' + e.error;
      document.getElementById('team-grid').innerHTML = `<div class="empty" style="grid-column:1/-1">${e.error}</div>`;
      return;
    }
    const data = await r.json();
    status.textContent = '';
    renderComparison(data, userA, optA, userB, optB);
  } catch(e) {
    status.textContent = '✗ ' + e.message;
  }
}

function renderComparison(data, userA, optA, userB, optB) {
  const {meta, teams, picksA, picksB} = data;

  // Stats
  document.getElementById('stats-bar').style.display = 'flex';
  document.getElementById('legend').style.display = 'flex';
  document.getElementById('sc-a').innerHTML = `<div class="stat-n" style="color:var(--o${optA})">${userA}</div><div class="stat-l">Option ${optA} · ${meta.a.pickCount} picks</div>`;
  document.getElementById('sc-a').style.borderTopColor = optA=='1'?'var(--o1)':'var(--o2)';
  document.getElementById('sc-b').innerHTML = `<div class="stat-n" style="color:var(--o${optB})">${userB}</div><div class="stat-l">Option ${optB} · ${meta.b.pickCount} picks</div>`;
  document.getElementById('sc-b').style.borderTopColor = optB=='1'?'var(--o1)':'var(--o2)';
  document.getElementById('sn-pct').textContent  = meta.similarityPct + '%';
  document.getElementById('sn-swaps').textContent = `${meta.totalSwaps} trade${meta.totalSwaps!==1?'s':''} (${meta.playersMovd} players)` ;
  document.getElementById('sn-same').textContent = meta.totalSame;

  // Captain stripe colors
  const capColors = {
    'Anil':'#4a148c','Pratik':'#0d1b2a','Harsha':'#1b5e20',
    'Shanthan':'#7f0000','Koti':'#311b92','Karthik S':'#1a3566'
  };

  // Team grid
  const CAPS_ORDER = ['Anil','Pratik','Harsha','Shanthan','Koti','Karthik S'];
  const sortedTeams = [...teams].sort((a,b)=>
    (CAPS_ORDER.indexOf(a.captain)||99)-(CAPS_ORDER.indexOf(b.captain)||99)
  );

  document.getElementById('team-grid').innerHTML = sortedTeams.map(t => {
    const col = capColors[t.captain] || '#333';
    const rows = t.players.map(p => {
      const cls = p.same ? 'same' : p.inOpt1 ? 'only-a' : 'only-b'; // inOpt1 = in A
      const tag = p.same
        ? `<span class="tp-tag ts">Both</span>`
        : p.inOpt1
          ? `<span class="tp-tag ta">Opt ${optA}</span>`
          : `<span class="tp-tag tb">Opt ${optB}</span>`;
      return `<div class="tp ${cls}"><span class="tp-name">${p.name}</span>${tag}</div>`;
    }).join('');
    return `<div class="tc">
      <div class="tc-hd" style="background:${col}">
        <span>${t.captain}</span>
        <span class="diff-ct">${t.diffCount} diff</span>
      </div>
      ${rows}
    </div>`;
  }).join('');

  // Pick-by-pick table
  const maxPicks = Math.max(picksA?.length||0, picksB?.length||0);
  if (maxPicks > 0) {
    document.getElementById('pick-table-wrap').style.display = 'block';
    let rows = '';
    for (let i=0; i<maxPicks; i++) {
      const pa = picksA?.[i], pb = picksB?.[i];
      const same = pa && pb && pa.captain===pb.captain && pa.player===pb.player;
      const bg = i%2 ? '' : 'background:#fafafa';
      rows += `<tr style="${bg}">
        <td style="font-family:'Roboto Mono',monospace;color:var(--muted)">${i+1}</td>
        <td class="${pa&&!same?'diff diff-a':''}">${pa ? `${pa.captain} → ${pa.label||pa.player}` : '—'}</td>
        <td class="${pb&&!same?'diff diff-b':''}">${pb ? `${pb.captain} → ${pb.label||pb.player}` : '—'}</td>
        <td style="text-align:center">${same?'<span class="match-tick">✓</span>':'<span class="diff-cross">✗</span>'}</td>
      </tr>`;
    }
    document.getElementById('pick-table').innerHTML = `
      <thead><tr style="background:var(--navy);color:#fff">
        <th>#</th>
        <th><span class="opt-tag o${optA}" style="margin-right:5px">Opt${optA}</span>${userA}</th>
        <th><span class="opt-tag o${optB}" style="margin-right:5px">Opt${optB}</span>${userB}</th>
        <th style="text-align:center">Match</th>
      </tr></thead><tbody>${rows}</tbody>`;
  }
}

loadSaves();
</script>
</body>
</html>
